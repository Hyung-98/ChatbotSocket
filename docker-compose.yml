version: '3.9'

# Local development only.
# For production, use the Kubernetes manifests in k8s/.
#
# Prerequisites:
#   - chatbot-postgres container must be running: docker start chatbot-postgres
#   - Copy .env.example to .env and fill in ANTHROPIC_API_KEY, GEMINI_API_KEY, NEXTAUTH_SECRET
#
# Usage:
#   docker start chatbot-postgres
#   docker-compose up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Use deps stage: only runs `npm ci`, no next build step.
      # Source code is injected at runtime via the volume mount below.
      target: deps
    container_name: chatbotsocket-app
    restart: unless-stopped
    # Override the production CMD with the dev workflow
    command: >
      sh -c "npm run db:generate &&
             npx prisma db push --accept-data-loss &&
             npm run dev"
    ports:
      - "3100:3100"
    environment:
      # host.docker.internal → reaches the host machine's port 5432 (chatbot-postgres)
      # This avoids port conflict with an existing postgres container.
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/ai_chatbot
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3100
    env_file:
      # Create .env from .env.example; add ANTHROPIC_API_KEY, GEMINI_API_KEY, NEXTAUTH_SECRET
      - .env
    extra_hosts:
      # Ensures host.docker.internal resolves correctly on Linux (auto on Windows/Mac)
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount source for hot-reload
      - .:/app
      # Exclude these from the bind mount — use the container's own copies
      - /app/node_modules
      - /app/.next
