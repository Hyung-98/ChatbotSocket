apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbotsocket-hpa
  namespace: chatbotsocket
  labels:
    app: chatbotsocket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbotsocket-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
# Note: HPA requires the metrics-server addon.
# minikube: minikube addons enable metrics-server
