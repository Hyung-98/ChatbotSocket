apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: chatbotsocket
  labels:
    app: chatbotsocket
data:
  NODE_ENV: "production"
  PORT: "3100"
  HOSTNAME: "0.0.0.0"
  # Update NEXTAUTH_URL to your actual domain when deploying to cloud
  NEXTAUTH_URL: "http://chatbotsocket.local"
