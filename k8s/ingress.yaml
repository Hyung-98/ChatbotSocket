apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbotsocket-ingress
  namespace: chatbotsocket
  labels:
    app: chatbotsocket
  annotations:
    # SSE CRITICAL: Disable proxy buffering so stream chunks reach the client immediately.
    # Without this, nginx buffers the entire SSE response and the client sees nothing
    # until the AI finishes generating — defeating the purpose of streaming.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # SSE CRITICAL: Extend timeouts for long-lived SSE connections.
    # AI responses can take minutes; default nginx timeout (60s) would kill them.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

    # Match next.config.js serverActions bodySizeLimit
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"

    # Keep upstream connections alive across requests
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "32"
spec:
  # K8s 1.22+ preferred field (replaces kubernetes.io/ingress.class annotation)
  ingressClassName: nginx
  rules:
    # No host specified → catch-all: accepts traffic from any IP/domain.
    # After NGINX Controller gets its External IP, update NEXTAUTH_URL in configmap.yaml.
    # To bind a domain later: add "- host: your-domain.com" and remove the bare "- http:" rule.
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbotsocket-service
                port:
                  number: 80
# GKE setup:
#   1. Install NGINX Ingress Controller (once per cluster):
#        helm upgrade --install ingress-nginx ingress-nginx \
#          --repo https://kubernetes.github.io/ingress-nginx \
#          --namespace ingress-nginx --create-namespace
#   2. Get External IP:
#        kubectl get svc -n ingress-nginx ingress-nginx-controller
#   3. Update NEXTAUTH_URL in k8s/app/configmap.yaml with the External IP
