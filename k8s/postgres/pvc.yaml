apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: chatbotsocket
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # GKE: standard-rwo = Zonal SSD (ReadWriteOnce)
  # For minikube: comment out storageClassName to use default "standard" (hostPath)
  # For other cloud providers:
  #   AWS EKS:  storageClassName: gp2
  #   AKS:      storageClassName: managed-premium
  storageClassName: standard-rwo
