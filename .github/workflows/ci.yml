name: ChatbotSocket CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual deployment trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Kubernetes after build?"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chatbotsocket

jobs:
  # ============================================================
  # Job 1: Lint
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # Required so TypeScript can resolve Prisma types during lint.
        # DATABASE_URL placeholder is sufficient — generate only reads the schema.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run db:generate

      - name: Run ESLint
        # Pass dummy API key values so lib/anthropic.ts / lib/google.ts don't throw
        # when ESLint imports them for static analysis.
        env:
          ANTHROPIC_API_KEY: lint-placeholder
          GEMINI_API_KEY: lint-placeholder
          NEXTAUTH_SECRET: lint-placeholder
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run lint

  # ============================================================
  # Job 2: Build Docker image and push to ghcr.io
  # ============================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write # Required to push to ghcr.io

    outputs:
      sha-tag: ${{ steps.sha-tag.outputs.tag }}
      migrate-sha-tag: ${{ steps.sha-tag.outputs.migrate-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip login on pull requests (we build but don't push)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA tags
        id: sha-tag
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "migrate-tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:migrate-sha-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata (runner)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Immutable reference tied to the exact commit
            type=sha,prefix=sha-,format=long
            # Branch name tag (e.g. main)
            type=ref,event=branch
            # 'latest' only on main branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image (runner)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          # Only push on main branch push events (not PRs, not other branches)
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata (migrator)
        id: meta-migrate
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=migrate-sha-,format=long
            type=raw,value=migrate,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image (migrator)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-migrate.outputs.tags }}
          labels: ${{ steps.meta-migrate.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: Deploy to Kubernetes (GKE via OIDC)
  #
  # Prerequisites (one-time setup):
  #   1. GCP Workload Identity Federation configured for this repo
  #   2. GitHub Secrets registered (Settings → Secrets → Actions):
  #        GCP_WORKLOAD_IDENTITY_PROVIDER  — projects/.../providers/...
  #        GCP_SERVICE_ACCOUNT             — sa-name@project.iam.gserviceaccount.com
  #        GCP_PROJECT_ID                  — your GCP project ID
  #   3. K8s Secret applied to cluster before first deploy:
  #        kubectl apply -f k8s/namespace.yaml
  #        kubectl apply -f k8s/secrets/secrets.yaml
  #        rm k8s/secrets/secrets.yaml
  # ============================================================
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only run when manually triggered with deploy=true.
    # For local minikube, apply k8s/ manifests manually instead (see k8s/ingress.yaml).
    # To deploy: Actions → Run workflow → check "Deploy to GKE"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    # To add a manual approval gate: create an Environment named "production" in
    # GitHub repo Settings → Environments, then uncomment the line below.
    # environment: production

    permissions:
      contents: read
      id-token: write # 🔥 반드시 필요 (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1️⃣ GCP 인증 (OIDC)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2️⃣ GKE credential 자동 구성
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          cluster_name: chatbot-cluster
          location: asia-northeast3

      # 3️⃣ Namespace
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # 4️⃣ PostgreSQL
      - name: Apply PostgreSQL manifests
        run: |
          kubectl apply -f k8s/postgres/configmap.yaml
          kubectl apply -f k8s/postgres/pvc.yaml
          kubectl apply -f k8s/postgres/statefulset.yaml
          kubectl apply -f k8s/postgres/service.yaml

      - name: Wait for PostgreSQL to be ready
        run: |
          kubectl rollout status statefulset/postgres \
            -n chatbotsocket \
            --timeout=120s

      # 5️⃣ App Config
      - name: Apply app ConfigMap
        run: kubectl apply -f k8s/app/configmap.yaml

      # 6️⃣ SHA 이미지 패치
      - name: Patch deployment image to exact SHA tag
        run: |
          SHA_TAG="${{ needs.build-and-push.outputs.sha-tag }}"
          MIGRATE_SHA_TAG="${{ needs.build-and-push.outputs.migrate-sha-tag }}"

          kubectl set image deployment/chatbotsocket-app \
            prisma-migrate="${MIGRATE_SHA_TAG}" \
            chatbotsocket="${SHA_TAG}" \
            -n chatbotsocket || true

      # 7️⃣ 나머지 리소스 적용
      - name: Apply remaining app manifests
        run: |
          kubectl apply -f k8s/app/deployment.yaml
          kubectl apply -f k8s/app/service.yaml
          kubectl apply -f k8s/app/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      # 8️⃣ 롤아웃 대기
      - name: Wait for app deployment to roll out
        run: |
          kubectl rollout status deployment/chatbotsocket-app \
            -n chatbotsocket \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n chatbotsocket
          kubectl get services -n chatbotsocket
          kubectl get ingress -n chatbotsocket
