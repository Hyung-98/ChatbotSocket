name: ChatbotSocket CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, windows]

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Verify Node
        run: node -v

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm run test -- --coverage

      - name: Build
        run: npm run build
