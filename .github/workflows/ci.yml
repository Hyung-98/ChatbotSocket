name: ChatbotSocket CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual build trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chatbotsocket

jobs:
  # ============================================================
  # Job 1: Lint
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # Required so TypeScript can resolve Prisma types during lint.
        # DATABASE_URL placeholder is sufficient — generate only reads the schema.
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run db:generate

      - name: Run ESLint
        # Pass dummy API key values so lib/anthropic.ts / lib/google.ts don't throw
        # when ESLint imports them for static analysis.
        env:
          ANTHROPIC_API_KEY: lint-placeholder
          GEMINI_API_KEY: lint-placeholder
          NEXTAUTH_SECRET: lint-placeholder
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run lint

  # ============================================================
  # Job 2: Build Docker image and push to ghcr.io
  # ============================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write # Required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip login on pull requests (we build but don't push)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (runner)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Immutable reference tied to the exact commit
            type=sha,prefix=sha-,format=long
            # Branch name tag (e.g. main)
            type=ref,event=branch
            # 'latest' only on main branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image (runner)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          # Only push on main branch push events (not PRs, not other branches)
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: Deploy to Railway
  #
  # Prerequisites (one-time setup):
  #   1. Create a deploy webhook in Railway dashboard:
  #        Railway project → Settings → Deploy Webhook → copy URL
  #   2. Add GitHub Secret (Settings → Secrets → Actions):
  #        RAILWAY_DEPLOY_WEBHOOK — the Railway webhook URL
  # ============================================================
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway deployment
        run: curl -X POST "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}"
